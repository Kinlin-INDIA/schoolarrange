      DB.setTimetable(updated);
      return updated;
    });
  };
  const setMainSchedule=(fn)=>{
    setTimetable(prev=>{
      const newSched=typeof fn==="function"?fn(prev.mainSchedule):fn;
      const updated={...prev,mainSchedule:newSched};
      DB.setTimetable(updated);
      return updated;
    });
  };

  // ── Add custom class ──
  const addCustomClass=()=>{
    if(!newCF.id.trim()||!newCF.label.trim()||!newCF.group.trim()){alert("ID, Label and Group are required.");return;}
    if(allClasses.find(c=>c.id===newCF.id.trim())){alert("ID already exists. Choose a different one.");return;}
    const updated={...timetable,customClasses:[...(timetable.customClasses||[]),{...newCF,id:newCF.id.trim().toUpperCase()}]};
    save(updated);
    setNewCF({id:"",label:"",group:"",tier:"main",stream:""});
    setShowAddClass(false);
    alert("Class/Section added!");
  };

  // ── Edit custom class ──
  const startEditCls=(c)=>{setEditClsId(c.id);setEditClsForm({...c});};
  const saveEditCls=()=>{
    const updated={...timetable,customClasses:(timetable.customClasses||[]).map(c=>c.id===editClsId?{...editClsForm}:c)};
    save(updated);setEditClsId(null);
  };
  const deleteCustomCls=(id)=>{
    const ft={...timetable.fullTimetable};delete ft[id];
    const cs={...timetable.classSubjects};delete cs[id];
    const updated={...timetable,customClasses:(timetable.customClasses||[]).filter(c=>c.id!==id),fullTimetable:ft,classSubjects:cs};
    save(updated);
    if(selClass===id)setSelClass("");
  };

  // ── Combined periods ──
  const addDayGroup=()=>setCombForm(p=>({...p,dayGroups:[...p.dayGroups,{days:[],teacherId:""}]}));
  const removeDayGroup=(i)=>setCombForm(p=>({...p,dayGroups:p.dayGroups.filter((_,j)=>j!==i)}));
  const toggleDayInGroup=(groupIdx,day)=>{
    setCombForm(p=>{
      const dg=[...p.dayGroups];
      const g={...dg[groupIdx]};
      g.days=g.days.includes(day)?g.days.filter(d=>d!==day):[...g.days,day];
      dg[groupIdx]=g;
      return{...p,dayGroups:dg};
    });
  };
  const saveCombined=()=>{
    if(!combForm.period||!combForm.reason){alert("Period and reason are required.");return;}
    if(combForm.dayGroups.some(g=>g.days.length===0)){alert("Each day group must have at least one day selected.");return;}
    const entry={...combForm,id:editCombIdx!==null?(timetable.combinedPeriods[editCombIdx]?.id||`CP${Date.now()}`):(`CP${Date.now()}`)};
    const cp=[...(timetable.combinedPeriods||[])];
    if(editCombIdx!==null)cp[editCombIdx]=entry;
    else cp.push(entry);
    const updated={...timetable,combinedPeriods:cp};
    save(updated);
    setShowCombForm(false);setCombForm({reason:"",teacher:"",period:"",dayGroups:[{days:[],teacherId:""}]});setEditCombIdx(null);
    alert("Combined period saved!");
  };
  const startEditComb=(idx)=>{
    const c=timetable.combinedPeriods[idx];
    setCombForm({
      reason:c.reason||"",teacher:c.teacher||"",period:c.period||"",
      dayGroups:c.dayGroups||[{days:c.days||[],teacherId:c.teacher||""}],
    });
    setEditCombIdx(idx);setShowCombForm(true);
  };
  const removeCombined=(idx)=>{
    const updated={...timetable,combinedPeriods:timetable.combinedPeriods.filter((_,i)=>i!==idx)};
    save(updated);
  };

  const getTeacherName=(tid)=>teachers.find(t=>t.id===tid)?.name||"—";
  const getSchedLabel=(period)=>{
    const sl=[...timetable.mainSchedule,...timetable.nurserySchedule].find(s=>s.id===period||s.period===parseInt(period));
    return sl?.label||`P${period}`;
  };
  const fi={...s.inp,padding:"5px 8px",fontSize:12};
  const allGroups=[...new Set(allClasses.map(c=>c.group))];

  return(
    <div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Class Timetable & Structure</div>
      <div style={{fontSize:12,color:C.g500,marginBottom:16}}>Full timetable, schedule, combined periods and class management.</div>

      {/* Tab bar */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[
          {id:"full",l:"📋 Full Timetable"},
          {id:"schedule",l:"🕐 School Schedule"},
          {id:"combined",l:"🔗 Combined Periods"},
          {id:"classes",l:"🏫 Manage Classes"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={s.btn(tab===t.id?"primary":"secondary")}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ══ TAB: FULL TIMETABLE (Mon–Sat grid) ══ */}
      {tab==="full"&&(
        <div>
          {/* Class selector */}
          <div style={{...s.card,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Select Class / Section</div>
            {allGroups.map(grp=>(
              <div key={grp} style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>{grp}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {allClasses.filter(c=>c.group===grp).map(c=>(
                    <button key={c.id} onClick={()=>setSelClass(c.id)}
                      style={{padding:"4px 10px",borderRadius:6,
                        border:`1px solid ${selClass===c.id?C.blue:C.g200}`,
                        fontSize:11,fontWeight:selClass===c.id?600:400,cursor:"pointer",
                        background:selClass===c.id?C.blueL:C.white,
                        color:selClass===c.id?C.blue:C.g600}}>
                      {c.label}{c.stream?` (${c.stream})`:""}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {selClass&&cls&&(
            <div style={s.card}>
              {/* Header like the image */}
              <div style={{textAlign:"center",marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.g200}`}}>
                <div style={{fontSize:16,fontWeight:700}}>Classwise Time-Table</div>
                <div style={{fontSize:12,color:C.g600,marginTop:4}}>
                  Season: Summer / Winter Time &nbsp;·&nbsp; Class: {cls.group} &nbsp;·&nbsp; Section: {cls.label.split(" - ")[1]||""}
                  {cls.stream?<span style={{...s.bdg(C.purple,C.purpleL),marginLeft:8}}>{cls.stream}</span>:null}
                </div>
              </div>
              <FullTimetableView
                classId={selClass} cls={cls} schedule={schedule}
                timetable={timetable} setTimetable={save} teachers={teachers}/>
            </div>
          )}
          {!selClass&&(
            <div style={{...s.card,textAlign:"center",padding:50}}>
              <div style={{fontSize:24,marginBottom:12}}>📋</div>
              <div style={{fontSize:14,fontWeight:500,color:C.g600}}>Select a class above to view / edit its timetable</div>
            </div>
          )}
        </div>
      )}

      {/* ══ TAB: SCHOOL SCHEDULE (fully editable) ══ */}
      {tab==="schedule"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <ScheduleEditor
            schedule={timetable.nurserySchedule}
            setSchedule={setNurserySchedule}
            title="Nursery / LKG / UKG Schedule"
            subtitle="PG · Nursery · LKG · UKG — ends 12:20 PM"/>
          <ScheduleEditor
            schedule={timetable.mainSchedule}
            setSchedule={setMainSchedule}
            title="Class 1–12 Schedule"
            subtitle="Reporting 7:40 AM · School Bus 1:20 PM"/>
        </div>
      )}

      {/* ══ TAB: COMBINED PERIODS ══ */}
      {tab==="combined"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>Combined Class Periods</div>
              <div style={{fontSize:11,color:C.g500,marginTop:2}}>
                Different teachers can be assigned for different days in the same combined period.
              </div>
            </div>
            <button onClick={()=>{
              setShowCombForm(true);setEditCombIdx(null);
              setCombForm({reason:"",teacher:"",period:"",dayGroups:[{days:[],teacherId:""}]});
            }} style={s.btn("primary")}>
              <Ic n="plus" sz={13} c={C.white}/> Add Combined Period
            </button>
          </div>

          {/* Info box explaining day-groups */}
          <div style={{background:C.blueL,border:`1px solid ${C.blue}20`,borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.g700}}>
            <strong>How day-wise teachers work:</strong> For example, Physical Education can have Teacher 1 on Mon+Tue, Teacher 2 on Wed+Thu, Teacher 3 on Fri+Sat — each is a "Day Group". The arrangement algorithm knows which teacher is responsible on which day.
          </div>

          {/* COMBINED FORM */}
          {showCombForm&&(
            <div style={{...s.card,marginBottom:20,borderLeft:`3px solid ${C.purple}`}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:16}}>{editCombIdx!==null?"Edit":"New"} Combined Period</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:6}}>Period *</div>
                  <select style={s.inp} value={combForm.period}
                    onChange={e=>setCombForm(p=>({...p,period:e.target.value}))}>
                    <option value="">-- Select Period --</option>
                    {timetable.mainSchedule.filter(sl=>sl.type==="period").map(sl=>(
                      <option key={sl.id} value={sl.id}>{sl.label} ({sl.start}–{sl.end})</option>
                    ))}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:6}}>Subject / Reason *</div>
                  <input style={s.inp} placeholder="e.g. Physical Education, Assembly..."
                    value={combForm.reason}
                    onChange={e=>setCombForm(p=>({...p,reason:e.target.value}))}/>
                </div>
              </div>

              {/* Classes to combine */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:8}}>Classes to Combine *</div>
                <div style={{maxHeight:220,overflowY:"auto",border:`1px solid ${C.g200}`,borderRadius:8,padding:10}}>
                  {allGroups.map(grp=>(
                    <div key={grp} style={{marginBottom:8}}>
                      <div style={{fontSize:10,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}}>{grp}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {allClasses.filter(c=>c.group===grp).map(c=>{
                          const isInAnyGroup=combForm.dayGroups?.some(g=>g.classes?.includes(c.id));
                          return(
                            <label key={c.id} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,cursor:"pointer",
                              padding:"2px 7px",borderRadius:4,
                              border:`1px solid ${isInAnyGroup?C.purple:C.g200}`,
                              background:isInAnyGroup?C.purpleL:C.white,
                              color:isInAnyGroup?C.purple:C.g600,userSelect:"none"}}>
                              <input type="checkbox" style={{width:11,height:11,accentColor:C.purple}}
                                checked={isInAnyGroup}
                                onChange={()=>{
                                  // toggle in first day group by default
                                  setCombForm(p=>{
                                    const dg=[...p.dayGroups];
                                    if(!dg[0])dg[0]={days:[],teacherId:"",classes:[]};
                                    const g={...dg[0],classes:[...(dg[0].classes||[])]};
                                    if(g.classes.includes(c.id))g.classes=g.classes.filter(x=>x!==c.id);
                                    else g.classes.push(c.id);
                                    dg[0]=g;
                                    return{...p,dayGroups:dg};
                                  });
                                }}/>
                              {c.label}
                            </label>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Day Groups — the key feature */}
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:600,color:C.g700}}>Day-wise Teacher Assignment *</div>
                  <button onClick={addDayGroup} style={s.btn("secondary","sm")}><Ic n="plus" sz={11} c={C.g600}/> Add Day Group</button>
                </div>
                {combForm.dayGroups.map((grp,gi)=>(
                  <div key={gi} style={{border:`1px solid ${C.g200}`,borderRadius:8,padding:12,marginBottom:10,background:C.g50}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{fontSize:12,fontWeight:500,color:C.g700}}>Group {gi+1}</div>
                      {combForm.dayGroups.length>1&&(
                        <button onClick={()=>removeDayGroup(gi)} style={s.btn("danger","sm")}><Ic n="x" sz={10} c={C.red}/></button>
                      )}
                    </div>
                    {/* Day selector */}
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:6}}>Days for this group:</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {DAYS.map(day=>{
                          const sel=grp.days?.includes(day);
                          // check if day already used in another group
                          const usedInOther=combForm.dayGroups.some((g,i)=>i!==gi&&g.days?.includes(day));
                          return(
                            <button key={day} onClick={()=>!usedInOther&&toggleDayInGroup(gi,day)}
                              disabled={usedInOther}
                              style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${sel?C.blue:usedInOther?C.g200:C.g300}`,
                                fontSize:11,fontWeight:sel?600:400,cursor:usedInOther?"not-allowed":"pointer",
                                background:sel?C.blueL:usedInOther?C.g100:C.white,
                                color:sel?C.blue:usedInOther?C.g300:C.g600,
                                opacity:usedInOther?0.5:1}}>
                              {day.slice(0,3)}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    {/* Teacher for this day group */}
                    <div>
                      <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Teacher for these days:</div>
                      <select style={s.inp} value={grp.teacherId||""}
                        onChange={e=>{
                          setCombForm(p=>{
                            const dg=[...p.dayGroups];
                            dg[gi]={...dg[gi],teacherId:e.target.value};
                            return{...p,dayGroups:dg};
                          });
                        }}>
                        <option value="">-- Not fixed --</option>
                        {teachers.map(t=><option key={t.id} value={t.id}>{t.name} ({t.subject})</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",gap:8}}>
                <button onClick={saveCombined} style={s.btn("primary")}>
                  <Ic n="chk" sz={13} c={C.white}/> Save Combined Period
                </button>
                <button onClick={()=>{setShowCombForm(false);setCombForm({reason:"",teacher:"",period:"",dayGroups:[{days:[],teacherId:""}]});setEditCombIdx(null);}}
                  style={s.btn("secondary")}>Cancel</button>
              </div>
            </div>
          )}

          {/* List of combined periods */}
          {!timetable.combinedPeriods?.length?(
            <div style={{...s.card,textAlign:"center",padding:50}}>
              <div style={{fontSize:24,marginBottom:12}}>🔗</div>
              <div style={{fontSize:14,fontWeight:500,color:C.g600}}>No combined periods yet</div>
              <div style={{fontSize:12,color:C.g400,marginTop:6}}>Click "Add Combined Period" above.</div>
            </div>
          ):(
            timetable.combinedPeriods.map((cp,i)=>(
              <div key={cp.id||i} style={{...s.card,marginBottom:12,borderLeft:`3px solid ${C.purple}`}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                      <span style={s.bdg(C.purple,C.purpleL)}>{getSchedLabel(cp.period)}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{cp.reason}</span>
                    </div>
                    {/* Day Groups display */}
                    {(cp.dayGroups||[]).map((dg,gi)=>(
                      <div key={gi} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                        <div style={{display:"flex",gap:4}}>
                          {(dg.days||[]).map(d=>(
                            <span key={d} style={s.bdg(C.blue,C.blueL)}>{d.slice(0,3)}</span>
                          ))}
                        </div>
                        <span style={{fontSize:12,color:C.g500}}>→</span>
                        <span style={{fontSize:12,fontWeight:500}}>{dg.teacherId?getTeacherName(dg.teacherId):"No teacher fixed"}</span>
                      </div>
                    ))}
                    {/* Classes */}
                    {cp.dayGroups?.[0]?.classes?.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                        {cp.dayGroups[0].classes.map(cid=>{
                          const cl=allClasses.find(c=>c.id===cid);
                          return <span key={cid} style={s.bdg(C.g600,C.g100)}>{cl?.label||cid}</span>;
                        })}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:12}}>
                    <button onClick={()=>startEditComb(i)} style={s.btn("secondary","sm")}>Edit</button>
                    <button onClick={()=>removeCombined(i)} style={s.btn("danger","sm")}><Ic n="x" sz={11} c={C.red}/></button>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {/* ══ TAB: MANAGE CLASSES ══ */}
      {tab==="classes"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>Manage Classes & Sections</div>
              <div style={{fontSize:11,color:C.g500,marginTop:2}}>Add custom sections or edit/delete existing ones.</div>
            </div>
            <button onClick={()=>setShowAddClass(!showAddClass)} style={s.btn("primary")}>
              <Ic n="plus" sz={13} c={C.white}/> Add Section
            </button>
          </div>

          {/* Add form */}
          {showAddClass&&(
            <div style={{...s.card,marginBottom:16,borderLeft:`3px solid ${C.blue}`}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Add New Class / Section</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>
                    Unique ID *
                    <span style={{...s.bdg(C.g500,C.g100),marginLeft:6,fontSize:9}}>e.g. G6-E, NUR-C</span>
                  </div>
                  <input style={s.inp} placeholder="G6-E" value={newCF.id}
                    onChange={e=>setNewCF(p=>({...p,id:e.target.value.toUpperCase()}))}/>
                  <div style={{fontSize:10,color:C.g400,marginTop:3}}>Short code used internally. Cannot be changed later.</div>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Display Label *</div>
                  <input style={s.inp} placeholder="Grade 6 - E" value={newCF.label}
                    onChange={e=>setNewCF(p=>({...p,label:e.target.value}))}/>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Grade Group *</div>
                  <input style={s.inp} placeholder="Grade 6" value={newCF.group}
                    onChange={e=>setNewCF(p=>({...p,group:e.target.value}))}/>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Tier</div>
                  <select style={s.inp} value={newCF.tier} onChange={e=>setNewCF(p=>({...p,tier:e.target.value}))}>
                    <option value="main">Main School (Class 1–12)</option>
                    <option value="nursery">Nursery (PG–UKG)</option>
                  </select>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Stream (if applicable)</div>
                  <input style={s.inp} placeholder="Maths / Bio / Commerce" value={newCF.stream}
                    onChange={e=>setNewCF(p=>({...p,stream:e.target.value}))}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addCustomClass} style={s.btn("primary")}><Ic n="chk" sz={13} c={C.white}/> Save</button>
                <button onClick={()=>setShowAddClass(false)} style={s.btn("secondary")}>Cancel</button>
              </div>
            </div>
          )}

          {/* Default classes info — expandable via parent state */}
          <BuiltinClassList/>

          {/* Custom classes — fully editable */}
          {!(timetable.customClasses||[]).length?(
            <div style={{...s.card,textAlign:"center",padding:40,color:C.g400,fontSize:12}}>
              No custom sections added yet. Use "Add Section" above.
            </div>
          ):(
            <div style={s.card}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Custom Classes / Sections</div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={s.TH}>ID</th>
                  <th style={s.TH}>Label</th>
                  <th style={s.TH}>Group</th>
                  <th style={s.TH}>Tier</th>
                  <th style={s.TH}>Stream</th>
                  <th style={s.TH}>Actions</th>
                </tr></thead>
                <tbody>
                  {(timetable.customClasses||[]).map(c=>(
                    <tr key={c.id}>
                      {editClsId===c.id?(
                        <>
                          <td style={s.TD}><code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>{c.id}</code></td>
                          <td style={s.TD}><input style={{...fi,width:140}} value={editClsForm.label} onChange={e=>setEditClsForm(p=>({...p,label:e.target.value}))}/></td>
                          <td style={s.TD}><input style={{...fi,width:100}} value={editClsForm.group} onChange={e=>setEditClsForm(p=>({...p,group:e.target.value}))}/></td>
                          <td style={s.TD}>
                            <select style={{...fi,width:100}} value={editClsForm.tier} onChange={e=>setEditClsForm(p=>({...p,tier:e.target.value}))}>
                              <option value="main">Main</option>
                              <option value="nursery">Nursery</option>
                            </select>
                          </td>
                          <td style={s.TD}><input style={{...fi,width:90}} value={editClsForm.stream||""} onChange={e=>setEditClsForm(p=>({...p,stream:e.target.value}))}/></td>
                          <td style={s.TD}>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={saveEditCls} style={s.btn("success","sm")}><Ic n="chk" sz={11} c={C.green}/> Save</button>
                              <button onClick={()=>setEditClsId(null)} style={s.btn("secondary","sm")}>Cancel</button>
                            </div>
                          </td>
                        </>
                      ):(
                        <>
                          <td style={s.TD}><code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>{c.id}</code></td>
                          <td style={s.TD}>{c.label}</td>
                          <td style={s.TD}>{c.group}</td>
                          <td style={s.TD}><span style={s.bdg(c.tier==="nursery"?C.yellow:C.blue,c.tier==="nursery"?C.yellowL:C.blueL)}>{c.tier}</span></td>
                          <td style={s.TD}>{c.stream||<span style={{color:C.g300}}>—</span>}</td>
                          <td style={s.TD}>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={()=>startEditCls(c)} style={s.btn("secondary","sm")}>Edit</button>
                              <button onClick={()=>deleteCustomCls(c.id)} style={s.btn("danger","sm")}><Ic n="x" sz={11} c={C.red}/> Delete</button>
                            </div>
                          </td>
                        </>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Dashboard({teachers,attendance,arrangements,requests,user,attSaved}){
  const pCount=teachers.filter(t=>["present","halfday"].includes(attendance[t.id])).length;
  const aCount=teachers.filter(t=>["absent","halfday","emergency"].includes(attendance[t.id])).length;
  const pending=requests.filter(r=>r.status==="pending").length;
  const date=new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const isAdmin=user.role==="admin"||user.role==="superadmin";

  if(!isAdmin){
    const st=attendance[user.id]||"present";
    const saved=attSaved[user.id];
    const myArr=saved?arrangements.filter(a=>a.subId===user.id):[];
    return(
      <div>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Welcome, {user.name?.split(" ").slice(-1)[0]} 👋</div>
        <div style={{fontSize:12,color:C.g500,marginBottom:18}}>{date}</div>
        {!saved&&(
          <div style={{background:C.yellowL,color:C.yellow,padding:"10px 14px",borderRadius:8,fontSize:12,marginBottom:16,display:"flex",gap:6,alignItems:"center"}}>
            <Ic n="alert" sz={13} c={C.yellow}/> Please save your attendance to see today's arrangements.
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          {[{l:"My Arrangements",v:myArr.length,c:C.blue},{l:"Requests Used",v:requests.filter(r=>r.teacherId===user.id).length,c:C.yellow},{l:"Periods/Day",v:user.ppd,c:C.green}].map(x=>(
            <div key={x.l} style={{...s.card,borderLeft:`3px solid ${x.c}`}}>
              <div style={{fontSize:22,fontWeight:700,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:C.g500,marginTop:3}}>{x.l}</div>
            </div>
          ))}
        </div>
        {!myArr.length?<div style={{...s.card,textAlign:"center",padding:40}}><Ic n="chk" sz={32} c={C.g300}/><div style={{fontSize:13,color:C.g500,marginTop:12}}>{saved?"No arrangements today!":"Save attendance first."}</div></div>
          :myArr.map(a=>(
            <div key={a.id} style={{...s.card,borderLeft:`4px solid ${C.blue}`,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style={{fontSize:15,fontWeight:600}}>{a.class} — Section {a.section}</div><div style={{fontSize:12,color:C.g500,marginTop:4}}>Period {a.period} · Covering {a.abName}</div></div>
                <span style={s.bdg(C.green,C.greenL)}>Active</span>
              </div>
            </div>
          ))
        }
      </div>
    );
  }

  return(
    <div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{user.role==="superadmin"?"🔑 Super Admin Dashboard":"Good Morning, Admin 👋"}</div>
      <div style={{fontSize:12,color:C.g500,marginBottom:18}}>{date}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:16}}>
        {[{l:"Present",v:pCount,c:C.green},{l:"Absent/Partial",v:aCount,c:C.red},{l:"Arrangements",v:arrangements.length,c:C.blue},{l:"Pending Requests",v:pending,c:C.yellow}].map(x=>(
          <div key={x.l} style={{...s.card,borderLeft:`3px solid ${x.c}`}}>
            <div style={{fontSize:24,fontWeight:700,color:x.c}}>{x.v}</div>
            <div style={{fontSize:11,color:C.g500,marginTop:3}}>{x.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={s.card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Absent / Partial Teachers Today</div>
          {!teachers.filter(t=>["absent","halfday","emergency"].includes(attendance[t.id])).length
            ?<div style={{textAlign:"center",padding:24,color:C.g400,fontSize:12}}>All present 🎉</div>
            :teachers.filter(t=>["absent","halfday","emergency"].includes(attendance[t.id])).map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.g100}`}}>
                <div style={{...s.ava(30,C.redL)}}><span style={{color:C.red,fontWeight:600}}>{t.name.charAt(0)}</span></div>
                <div><div style={{fontSize:13,fontWeight:500}}>{t.name}</div><div style={{fontSize:11,color:C.g500}}>{t.subject}</div></div>
                <span style={{...s.bdg(attendance[t.id]==="halfday"?C.yellow:attendance[t.id]==="emergency"?C.purple:C.red,attendance[t.id]==="halfday"?C.yellowL:attendance[t.id]==="emergency"?C.purpleL:C.redL),marginLeft:"auto"}}>{attendance[t.id]}</span>
              </div>
            ))
          }
        </div>
        <div style={s.card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Today's Arrangements</div>
          {!arrangements.length?<div style={{textAlign:"center",padding:24,color:C.g400,fontSize:12}}>None yet. Mark attendance first.</div>:(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={s.TH}>Substitute</th><th style={s.TH}>Class</th><th style={s.TH}>P.</th></tr></thead>
              <tbody>{arrangements.slice(0,6).map(a=>(
                <tr key={a.id}><td style={s.TD}>{a.subName}</td><td style={s.TD}>{a.class}-{a.section}</td><td style={s.TD}>{a.period}</td></tr>
              ))}</tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════
// ROOT APP
// ═══════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("dashboard");
  const[loading,setLoading]=useState(true);

  // All state starts from localStorage (instant), then Supabase overwrites if configured
  const[teachers,setTeachersState]=useState(()=>LS.get("sa_teachers",INIT_TEACHERS));
  const[users,setUsersState]=useState(()=>LS.get("sa_users",INIT_USERS));
  const[periodsPerDay,setPPDState]=useState(()=>LS.get("sa_ppd",8));
  const[attendance,setAttendanceState]=useState(()=>{
    const saved=LS.get("sa_att_"+TODAY,null);
    if(saved)return saved;
    const m={};INIT_TEACHERS.forEach(t=>{m[t.id]="present";});
    return m;
  });
  const[arrangements,setArrangementsState]=useState(()=>LS.get("sa_arr_"+TODAY,[]));
  const[requests,setRequestsState]=useState(()=>LS.get("sa_req",[]));
  const[history,setHistory]=useState(()=>DB.getHistory({}));
  const[reasons,setReasonsState]=useState(()=>LS.get("sa_reasons_"+TODAY,{}));
  const[attSaved,setAttSavedState]=useState(()=>LS.get("sa_att_saved_"+TODAY,{}));

  // Load from Supabase on mount (if configured)
  useEffect(()=>{
    async function loadFromDB(){
      try{
        const[t,u,ppd,att,arr,req,rea,saved]=await Promise.all([
          DB.getTeachers(INIT_TEACHERS),
          DB.getUsers(INIT_USERS),
          DB.getPPD(8),
          DB.getAttendance(TODAY,null),
          DB.getArrangements(TODAY,[]),
          DB.getRequests([]),
          DB.getReasons(TODAY,{}),
          DB.getAttSaved(TODAY,{}),
        ]);
        setTeachersState(t);
        setUsersState(u);
        setPPDState(ppd);
        if(att){setAttendanceState(att);}
        setArrangementsState(arr);
        setRequestsState(req);
        setReasonsState(rea);
        setAttSavedState(saved);
      }catch(e){console.error("DB load error:",e);}
      finally{setLoading(false);}
    }
    loadFromDB();
  },[]);

  // Wrapped setters that also write to Supabase
  const setTeachers=(v)=>{
    setTeachersState(v);
    DB.setTeachers(v).then(()=>{
      console.log("✅ Teachers saved to Supabase:",v.length,"teachers");
    }).catch(e=>console.error("❌ Teachers Supabase error:",e));
  };
  const setUsers=(v)=>{
    setUsersState(v);
    DB.setUsers(v).then(()=>console.log("✅ Users saved to Supabase")).catch(e=>console.error("❌ Users error:",e));
  };
  const setPeriodsPerDay=(v)=>{setPPDState(v);DB.setPPD(v);};
  const setAttendance=(fn)=>{
    setAttendanceState(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      DB.setAttendance(TODAY,next);
      return next;
    });
  };
  const setArrangements=(fnOrVal)=>{
    setArrangementsState(prev=>{
      const next=typeof fnOrVal==="function"?fnOrVal(prev):fnOrVal;
      DB.setArrangements(TODAY,next);
      return next;
    });
  };
  const setRequests=(fnOrVal)=>{
    setRequestsState(prev=>{
      const next=typeof fnOrVal==="function"?fnOrVal(prev):fnOrVal;
      DB.setRequests(next);
      return next;
    });
  };
  const setReasons=(fn)=>{
    setReasonsState(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      DB.setReasons(TODAY,next);
      return next;
    });
  };
  const setAttSaved=(fn)=>{
    setAttSavedState(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      DB.setAttSaved(TODAY,next);
      return next;
    });
  };

  if(loading)return(
    <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{color:"#fff",fontSize:18,fontWeight:600}}>SchoolArrange</div>
      <div style={{color:"#71717A",fontSize:13}}>{_supa?"Connecting to database…":"Loading…"}</div>
    </div>
  );

  // FIX #9: save full list (all teachers) to history when generating
  const handleGenerate=(arr)=>{
    setArrangements(arr);
    // FIX #2: if teacher marked present, clear their absent reason
    const cleanedReasons={...reasons};
    teachers.forEach(t=>{
      if((attendance[t.id]||"present")==="present"){
        delete cleanedReasons[t.id];
      }
    });
    setReasons(cleanedReasons);
    LS.set("sa_reasons_"+TODAY,cleanedReasons);
    // FIX #1: save periodsPerDay in history snapshot
    const fullList=teachers.map(t=>({
      name:t.name,
      status:attendance[t.id]||"present",
      reason:(attendance[t.id]||"present")!=="present"?(cleanedReasons[t.id]||""):"",
    }));
    const absentList=fullList.filter(t=>t.status!=="present");
    const newHist={...history,[TODAY]:{arrangements:arr,absentList,fullList,date:TODAY,periodsPerDay}};
    setHistory(newHist);DB.setHistory(newHist);
  };

  if(!user)return <Login onLogin={u=>{setUser(u);setPage("dashboard");}} users={users} teachers={teachers}/>;

  const isAdmin=user.role==="admin"||user.role==="superadmin";
  const titles={dashboard:"Dashboard",attendance:"Attendance",arrangements:"Arrangements",history:"Past Days History",teachers:"Teachers",requests:"Change Requests",reports:"Monthly Reports",timetable:"Class Timetable",settings:"Settings",admins:"Manage Admins"};

  return(
    <div style={{height:"100vh",display:"flex",overflow:"hidden"}}>
      <Sidebar user={user} page={page} setPage={setPage} onLogout={()=>{setUser(null);setPage("dashboard");}}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{background:C.white,borderBottom:`1px solid ${C.g200}`,padding:"0 20px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontSize:14,fontWeight:600}}>{titles[page]||page}</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {user.role==="superadmin"&&<span style={s.bdg(C.purple,C.purpleL)}>🔑 Super Admin</span>}
            <div style={{fontSize:11,color:C.g500}}>{TODAY}</div>
            <div style={s.ava(28,user.role==="superadmin"?C.purple:user.role==="admin"?"#333":C.blue)}>{user.name?.charAt(0)}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:20,background:C.g50}}>
          {page==="dashboard"&&<Dashboard teachers={teachers} attendance={attendance} arrangements={arrangements} requests={requests} user={user} attSaved={attSaved}/>}
          {page==="attendance"&&<PageAttendance teachers={teachers} attendance={attendance} setAttendance={setAttendance} onGenerate={handleGenerate} arrangements={arrangements} setArrangements={setArrangements} user={user} periodsPerDay={periodsPerDay} reasons={reasons} setReasons={setReasons} attSaved={attSaved} setAttSaved={setAttSaved}/>}
          {page==="arrangements"&&<PageArrangements arrangements={arrangements} setArrangements={setArrangements} teachers={teachers} attendance={attendance} user={user} requests={requests} setRequests={setRequests} attSaved={attSaved}/>}
          {page==="history"&&isAdmin&&<PageHistory history={history}/>}
          {page==="teachers"&&isAdmin&&<PageTeachers teachers={teachers} setTeachers={setTeachers} user={user}/>}
          {page==="requests"&&<PageRequests requests={requests} setRequests={setRequests} arrangements={arrangements} setArrangements={setArrangements} teachers={teachers} attendance={attendance} user={user} periodsPerDay={periodsPerDay}/>}
          {page==="reports"&&<PageReports teachers={teachers} arrangements={arrangements} requests={requests} user={user}/>}
          {page==="timetable"&&isAdmin&&<PageTimetable teachers={teachers} periodsPerDay={periodsPerDay} user={user}/>}
          {page==="settings"&&isAdmin&&<PageSettings periodsPerDay={periodsPerDay} setPeriodsPerDay={setPeriodsPerDay}/>}
          {page==="admins"&&user.role==="superadmin"&&<PageAdmins users={users} setUsers={setUsers}/>}
          {page==="admins"&&user.role==="admin"&&<div style={{...s.card,textAlign:"center",padding:40,color:C.g400}}>Access denied. Only Super Admin can manage admins.</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
