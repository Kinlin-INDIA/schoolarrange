// ── ALGORITHM ──
function runAlgorithm(teachers,attendance,periodsPerDay,existing=[]){
  const PPD=periodsPerDay||8;
  const absent=teachers.filter(t=>["absent","halfday","emergency"].includes(attendance[t.id]));
  const present=teachers.filter(t=>["present","halfday"].includes(attendance[t.id]));
  const arr=[...existing];
  absent.forEach(at=>{
    const st=attendance[at.id];
    at.classes.forEach((cls,idx)=>{
      const period=(idx%PPD)+1;
      const section=SECTIONS[idx%SECTIONS.length];
      if(st==="halfday"){
        const from=parseInt(attendance[at.id+"_hf"]||"5");
        if(period<from)return;
      }
      if(st==="emergency"){
        const from=parseInt(attendance[at.id+"_ef"]||"1");
        if(period<from)return;
      }
      const abGroup=Object.entries(GROUPS).find(([,cs])=>cs.includes(cls))?.[0];
      const elig=present.filter(pt=>{
        if(pt.id===at.id)return false;
        if(arr.some(a=>a.subId===pt.id&&a.period===period))return false;
        const assigned=arr.filter(a=>a.subId===pt.id).length;
        if(assigned>=(PPD-pt.ppd))return false;
        const ptGroup=Object.entries(GROUPS).find(([,cs])=>pt.classes.some(c=>cs.includes(c)))?.[0];
        if(abGroup==="Gr11–12"||ptGroup==="Gr11–12")return ptGroup===abGroup;
        return true;
      });
      if(elig.length){
        const sub=elig.sort((a,b)=>{
          const af=(PPD-a.ppd)-arr.filter(x=>x.subId===a.id).length;
          const bf=(PPD-b.ppd)-arr.filter(x=>x.subId===b.id).length;
          return bf-af;
        })[0];
        arr.push({
          id:`A${Date.now()}${Math.random().toString(36).slice(2,5)}`,
          abId:at.id,abName:at.name,
          subId:sub.id,subName:sub.name,
          class:cls,section,period,
          status:"active",abGroup,
        });
      }
    });
  });
  return arr;
}

function getGroup(t){
  return Object.entries(GROUPS).find(([,cs])=>t.classes.some(c=>cs.includes(c)))?.[0];
}

function Login({onLogin,users,teachers}){
  const[id,setId]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const go=()=>{
    setErr("");
    const u=users.find(x=>x.id===id&&x.pw===pw);
    if(u){onLogin(u);return;}
    const t=teachers.find(x=>x.id===id&&x.pw===pw);
    if(t){onLogin({role:"teacher",...t});return;}
    setErr("Invalid ID or Password.");
  };
  const dk={background:"#1A1A1A",border:"1px solid #2A2A2A",color:C.white};
  return(
    <div style={{minHeight:"100vh",background:C.black,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:360}}>
        <div style={{textAlign:"center",marginBottom:32}}>

          </div>
          <div style={{color:C.white,fontSize:22,fontWeight:700,letterSpacing:-0.5}}>SchoolArrange</div>

          </div>
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:500,color:C.g400,marginBottom:5}}>Password</div>

}

function PageSettings({periodsPerDay,setPeriodsPerDay}){
  const[val,setVal]=useState(periodsPerDay);
  const[saved,setSaved]=useState(false);
  const save=()=>{
    const n=parseInt(val);
    if(n<4||n>10){alert("Periods must be between 4 and 10.");return;}
    setPeriodsPerDay(n);
    LS.set("sa_ppd",n);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };
  return(
    <div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>School Settings</div>

// ATTENDANCE PAGE — FIX #3 #4 #5 #8
// ═══════════════════════════════════
function PageAttendance({teachers,attendance,setAttendance,onGenerate,arrangements,setArrangements,user,periodsPerDay,reasons,setReasons,attSaved,setAttSaved}){

  const[done,setDone]=useState(arrangements.length>0);

  // FIX #8: properly save reason to parent state and localStorage
  const saveReason=(tid,reasonText)=>{
    const updated={...reasons,[tid]:reasonText};
    setReasons(updated);
    LS.set("sa_reasons_"+TODAY,updated);
  };

  const mark=(tid,st)=>setAttendance(p=>({...p,[tid]:st}));

  const generate=()=>{
    const arr=runAlgorithm(teachers,attendance,periodsPerDay);
    onGenerate(arr);
    setDone(true);
  };

  // ── TEACHER VIEW ──
  if(user.role==="teacher"){
    const st=attendance[user.id]||"present";
    const isSaved=attSaved[user.id];

    // FIX #3: Save attendance, then lock for teacher (admin can still change)
    const saveMyAttendance=()=>{
      const updated={...attSaved,[user.id]:true};
      setAttSaved(updated);
      LS.set("sa_att_saved_"+TODAY,updated);
      // Re-generate arrangements after teacher saves
      if(st!=="present"){
        const arr=runAlgorithm(teachers,attendance,periodsPerDay);
        onGenerate(arr);
      }
      alert("Attendance saved successfully!");
    };

    return(
      <div>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>My Attendance</div>
        <div style={{fontSize:12,color:C.g500,marginBottom:18}}>Mark your attendance for today — {TODAY}</div>

        <div style={{...s.card,maxWidth:440}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Today's Status</div>

          {/* Status buttons — locked after save (admin can override) */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[
              {v:"present",l:"✓ Present",c:C.green,bg:C.greenL},
              {v:"halfday",l:"½ Half Day",c:C.yellow,bg:C.yellowL},
              {v:"absent",l:"✗ Absent",c:C.red,bg:C.redL},
            ].map(o=>(
              <button key={o.v} onClick={()=>!isSaved&&mark(user.id,o.v)}
                style={{flex:1,padding:"10px 6px",borderRadius:8,
                  border:`2px solid ${st===o.v?o.c:C.g200}`,
                  fontSize:12,fontWeight:500,
                  cursor:isSaved?"not-allowed":"pointer",
                  opacity:isSaved&&st!==o.v?0.5:1,
                  background:st===o.v?o.bg:C.white,
                  color:st===o.v?o.c:C.g500}}>
                {o.l}
              </button>
            ))}
          </div>

          {/* Half day period selector */}
          {st==="halfday"&&!isSaved&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:500,color:C.g600,marginBottom:6}}>Absent from which period?</div>
              <select style={s.inp} value={attendance[user.id+"_hf"]||"5"}
                onChange={e=>setAttendance(p=>({...p,[user.id+"_hf"]:e.target.value}))}>
                {Array.from({length:periodsPerDay},(_,i)=>i+1).map(p=>(
                  <option key={p} value={p}>Period {p} onwards</option>
                ))}
              </select>
            </div>
          )}

          {/* FIX #8: Reason box with proper save */}
          {(st==="absent"||st==="halfday")&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:500,color:C.g600,marginBottom:6}}>Reason for Absence</div>
              <textarea style={{...s.inp,height:72,resize:"vertical",marginBottom:10}}
                placeholder="Medical / Personal / Family emergency..."
                value={reasons[user.id]||""}
                readOnly={isSaved}
                onChange={e=>setReasons(p=>({...p,[user.id]:e.target.value}))}/>
            </div>
          )}

          {/* FIX #3: Save button */}
          {!isSaved?(
            <button onClick={saveMyAttendance}
              style={{...s.btn("primary"),width:"100%",justifyContent:"center"}}>
              <Ic n="chk" sz={14} c={C.white}/> Save Attendance
            </button>
          ):(
            <div style={{...s.bdg(C.green,C.greenL),padding:"9px 14px",fontSize:12,justifyContent:"center",width:"100%"}}>
              <Ic n="chk" sz={13} c={C.green}/> Attendance saved — contact admin to change
            </div>
          )}
        </div>

        {/* FIX #5: Emergency leave — always visible next to attendance card */}
        <div style={{...s.card,maxWidth:440,marginTop:16,borderLeft:`3px solid ${C.red}`}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:C.red,display:"flex",alignItems:"center",gap:6}}>
            <Ic n="emer" sz={14} c={C.red}/> Emergency Leave
          </div>
          <div style={{fontSize:12,color:C.g500,marginBottom:10}}>Need to leave school urgently mid-day?</div>
          <div style={{fontSize:12,fontWeight:500,color:C.g600,marginBottom:6}}>Leaving from Period:</div>
          <select style={{...s.inp,marginBottom:10}}
            value={attendance[user.id+"_ef"]||""}
            onChange={e=>setAttendance(p=>({...p,[user.id+"_ef"]:e.target.value}))}>
            <option value="">-- Select Period --</option>
            {Array.from({length:periodsPerDay},(_,i)=>i+1).map(p=>(
              <option key={p} value={p}>Period {p}</option>
            ))}
          </select>
          <textarea style={{...s.inp,height:60,resize:"vertical",marginBottom:10}}
            placeholder="Reason for emergency..."
            value={reasons[user.id+"_emer"]||""}
            onChange={e=>setReasons(p=>({...p,[user.id+"_emer"]:e.target.value}))}/>

            mark(user.id,"emergency");
            // FIX #4 #5: remove future arrangements for this teacher, re-generate
            const fromPeriod=parseInt(from);
            const filtered=arrangements.filter(a=>!(a.subId===user.id&&a.period>=fromPeriod));
            const newArr=runAlgorithm(teachers,{...attendance,[user.id]:"emergency"},periodsPerDay,filtered);
            onGenerate(newArr);
            // Save reason
            saveReason(user.id+"_emer",reasons[user.id+"_emer"]||"Emergency");
            alert("Emergency leave marked. Remaining arrangements updated.");
          }} style={{...s.btn("danger"),width:"100%",justifyContent:"center"}}>
            Mark Emergency & Update Arrangements
          </button>
        </div>
      </div>
    );
  }

  // ── ADMIN VIEW ──
  const pCount=Object.values(attendance).filter(v=>["present","halfday"].includes(v)&&!v.includes("_")).length;
  const aCount=teachers.filter(t=>["absent","halfday","emergency"].includes(attendance[t.id])).length;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div style={{fontSize:16,fontWeight:600}}>Mark Attendance</div>
          <div style={{fontSize:12,color:C.g500,marginTop:2}}>
            {pCount} present · {aCount} absent/partial · {TODAY}
          </div>
        </div>
        <button onClick={generate} style={s.btn("primary")}>
          <Ic n="swap" sz={14} c={C.white}/> Generate Arrangements
        </button>
      </div>

      {done&&(
        <div style={{background:C.greenL,color:C.green,padding:"9px 14px",borderRadius:8,fontSize:12,display:"flex",alignItems:"center",gap:6,marginBottom:14}}>

      <div style={s.card}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:680}}>
            <thead>
              <tr>
                <th style={s.TH}>Teacher</th>
                <th style={s.TH}>Subject</th>
                <th style={s.TH}>PPD</th>
                <th style={s.TH}>Status</th>
                <th style={s.TH}>Reason + Save</th>
              </tr>
            </thead>
            <tbody>
              {teachers.map(t=>{
                const st=attendance[t.id]||"present";
                const isSaved=attSaved[t.id];
                return(
                  <tr key={t.id}>
                    <td style={s.TD}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={s.ava(28)}>{t.name.charAt(0)}</div>
                        <div>
                          <div style={{fontWeight:500,fontSize:13}}>{t.name}</div>
                          <div style={{fontSize:10,color:C.g500}}>{t.id}</div>
                        </div>
                      </div>
                    </td>
                    <td style={s.TD}>{t.subject}</td>
                    <td style={s.TD}>{t.ppd}</td>
                    <td style={s.TD}>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {[
                          {v:"present",l:"P",c:C.green,bg:C.greenL},
                          {v:"halfday",l:"½",c:C.yellow,bg:C.yellowL},
                          {v:"absent",l:"A",c:C.red,bg:C.redL},
                          {v:"emergency",l:"E!",c:C.purple,bg:C.purpleL},

                              border:`1px solid ${st===o.v?o.c:C.g200}`,
                              fontSize:11,fontWeight:600,cursor:"pointer",

// ═══════════════════════════════════
// ARRANGEMENTS — FIX #4 #5: show only relevant arrangements
// ═══════════════════════════════════
function PageArrangements({arrangements,setArrangements,teachers,attendance,user,requests,setRequests,attSaved}){
  // FIX #4: Teacher sees arrangements only after saving attendance
  // FIX #5: halfday/emergency teacher sees only completed periods; absent sees none as substitute
  const getMyArrangements=()=>{
    if(user.role!=="teacher")return arrangements;
    const st=attendance[user.id]||"present";
    const saved=attSaved[user.id];

    // FIX #4: Only show if attendance is saved
    if(!saved&&st==="present")return[];
    if(st==="absent")return[]; // absent teacher has no arrangements to do

    // FIX #5: halfday — show only periods before halfday_from (periods they completed)
    if(st==="halfday"){
      const from=parseInt(attendance[user.id+"_hf"]||"5");
      // they completed periods 1 to from-1, rest are someone else's
      return arrangements.filter(a=>a.subId===user.id&&a.period<from);
    }

    // FIX #5: emergency — show only periods before emergency_from
    if(st==="emergency"){
      const from=parseInt(attendance[user.id+"_ef"]||"1");
      return arrangements.filter(a=>a.subId===user.id&&a.period<from);
    }

    return arrangements.filter(a=>a.subId===user.id);
  };

  const my=getMyArrangements();
  const st=attendance[user.id]||"present";
  const saved=attSaved[user.id];

  if(user.role==="teacher"&&!saved&&st==="present"){
    return(
      <div>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>My Arrangements</div>

                  <td style={s.TD}>
                    {a.acknowledged
                      ?<span style={s.bdg(C.green,C.greenL)}>✓ {a.ackTime?new Date(a.ackTime).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Kolkata"}):""}</span>

  );
}

// ═══════════════════════════════════
// HISTORY — FIX #9: reasons + present + halfday + emergency breakdown
// ═══════════════════════════════════
function PageHistory({history}){
  const[sel,setSel]=useState("");
  const dates=Object.keys(history).sort().reverse();
  const day=history[sel];

  const statusColor=(st)=>{
    if(st==="present")return{c:C.green,bg:C.greenL};
    if(st==="halfday")return{c:C.yellow,bg:C.yellowL};
    if(st==="emergency")return{c:C.purple,bg:C.purpleL};
    return{c:C.red,bg:C.redL};
  };

  return(
    <div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Past Days History</div>
      <div style={{fontSize:12,color:C.g500,marginBottom:18}}>Full attendance breakdown and arrangements for any past day</div>
      <select style={{...s.inp,maxWidth:220,marginBottom:20}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">-- Select a date --</option>
        {dates.map(d=><option key={d} value={d}>{d}{history[d]?.periodsPerDay?" ("+history[d].periodsPerDay+" periods)":""}</option>)}
      </select>

      {!sel&&(
        <div style={{...s.card,textAlign:"center",padding:50}}>
          <Ic n="hist" sz={32} c={C.g300}/>
          <div style={{fontSize:13,color:C.g500,marginTop:12}}>Select a date to view records</div>
        </div>
      )}

      {sel&&!day&&(
        <div style={{...s.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:13,color:C.g500}}>No data saved for this date.</div>
        </div>
      )}

      {sel&&day&&(
        <div>
          {/* FIX #9: Full attendance breakdown — present, halfday, emergency, absent */}
          <div style={{...s.card,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600}}>Full Attendance — {sel}</div>
              {day.periodsPerDay&&<span style={{...s.bdg(C.blue,C.blueL),fontSize:12}}>{day.periodsPerDay} Periods that day</span>}
            </div>

            {/* Summary row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {l:"Present",v:(day.fullList||[]).filter(x=>x.status==="present").length,c:C.green},
                {l:"Half Day",v:(day.fullList||[]).filter(x=>x.status==="halfday").length,c:C.yellow},
                {l:"Emergency",v:(day.fullList||[]).filter(x=>x.status==="emergency").length,c:C.purple},
                {l:"Absent",v:(day.absentList||[]).filter(x=>x.status==="absent").length,c:C.red},
              ].map(x=>(
                <div key={x.l} style={{textAlign:"center",padding:"10px",background:C.g50,borderRadius:8}}>
                  <div style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:C.g500,marginTop:3}}>{x.l}</div>
                </div>
              ))}
            </div>

            {/* Full teacher list */}
            {day.fullList?.length?(
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={s.TH}>Teacher</th>
                  <th style={s.TH}>Status</th>
                  <th style={s.TH}>Reason / Note</th>
                </tr></thead>
                <tbody>
                  {day.fullList.map((t,i)=>{
                    const sc=statusColor(t.status);
                    return(
                      <tr key={i}>
                        <td style={s.TD}>{t.name}</td>
                        <td style={s.TD}><span style={s.bdg(sc.c,sc.bg)}>{t.status}</span></td>
                        {/* FIX #2: show reason only if not present */}
                        <td style={s.TD}>{t.status==="present"?"—":(t.reason||"—")}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            ):(
              /* Fallback for older history without fullList */
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.g600,marginBottom:8}}>Absent / Partial</div>
                {!day.absentList?.length
                  ?<div style={{fontSize:12,color:C.g500}}>All teachers were present.</div>
                  :<table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr><th style={s.TH}>Teacher</th><th style={s.TH}>Status</th><th style={s.TH}>Reason</th></tr></thead>
                    <tbody>{day.absentList.map((a,i)=>{
                      const sc=statusColor(a.status);
                      return(
                        <tr key={i}>
                          <td style={s.TD}>{a.name}</td>
                          <td style={s.TD}><span style={s.bdg(sc.c,sc.bg)}>{a.status}</span></td>
                          <td style={s.TD}>{a.reason||"—"}</td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                }
              </div>
            )}
          </div>

          {/* Arrangements */}
          <div style={s.card}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Arrangements ({day.arrangements?.length||0})</div>
            {!day.arrangements?.length?(
              <div style={{fontSize:12,color:C.g500}}>No arrangements that day.</div>
            ):(
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  <th style={s.TH}>Absent Teacher</th>
                  <th style={s.TH}>Substitute</th>
                  <th style={s.TH}>Class</th>
                  <th style={s.TH}>Period</th>
                </tr></thead>
                <tbody>{day.arrangements.map((a,i)=>(
                  <tr key={i}>
                    <td style={s.TD}>{a.abName}</td>
                    <td style={s.TD}>{a.subName}</td>
                    <td style={s.TD}>{a.class}-{a.section}</td>
                    <td style={s.TD}>P{a.period}</td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// TEACHERS — FIX #1 (save works) #6 (admin sees creds view-only)
// ═══════════════════════════════════
const EMPTY_T={id:"",name:"",subject:"",classes:[],ppd:5,classTeacher:"",adminRole:"",pw:"pass123"};

function PageTeachers({teachers,setTeachers,user}){
  const[q,setQ]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[newForm,setNewForm]=useState({...EMPTY_T});
  const[tab,setTab]=useState("list");
  const[showPwMap,setShowPwMap]=useState({});

  const isSA=user.role==="superadmin";
  const isAdmin=user.role==="admin"||isSA;
  const filtered=teachers.filter(t=>t.name.toLowerCase().includes(q.toLowerCase())||t.subject.toLowerCase().includes(q.toLowerCase()));
  const fi={...s.inp,padding:"5px 8px",fontSize:12};

  // FIX #1: Actually save new teacher to state AND localStorage
  const addTeacher=()=>{
    if(!newForm.id.trim()||!newForm.name.trim()||!newForm.subject){
      alert("Teacher ID, Name, and Subject are required.");return;
    }
    if(teachers.find(t=>t.id===newForm.id.trim())){
      alert("A teacher with this ID already exists.");return;
    }
    const t={
      id:newForm.id.trim().toUpperCase(),
      name:newForm.name.trim(),
      subject:newForm.subject,
      classes:newForm.classes,
      ppd:newForm.ppd,
      classTeacher:newForm.classTeacher.trim()||null,
      adminRole:newForm.adminRole.trim()||null,
      pw:newForm.pw.trim()||"pass123",
    };
    const updated=[...teachers,t];
    setTeachers(updated);
    LS.set("sa_teachers",updated);
    // FIX #1: Reset form properly
    setNewForm({...EMPTY_T});
    setShowAdd(false);
    alert("Teacher added successfully!");
  };

  // FIX #1: Cancel clears form properly
  const cancelAdd=()=>{
    setNewForm({...EMPTY_T});
    setShowAdd(false);
  };

  const removeTeacher=(id)=>{
    const t=teachers.find(x=>x.id===id);
    if(!t)return;
    const updated=teachers.filter(x=>x.id!==id);
    setTeachersState(updated);
    LS.set("sa_teachers",updated);
    if(_supa)_supa.from("teachers").delete().eq("id",id).then(({error})=>{
      if(error)console.error("remove error:",error);
    });
    if(editId===id){setEditId(null);setEditForm({});}
  };

  const startEdit=(t)=>{
    setEditId(t.id);
    setEditForm({...t,classTeacher:t.classTeacher||"",adminRole:t.adminRole||""});
  };

  const saveEdit=()=>{
    if(!editForm.name.trim()){alert("Name cannot be empty.");return;}
    const updated=teachers.map(t=>t.id===editId?{
      ...editForm,
      classTeacher:editForm.classTeacher.trim()||null,
      adminRole:editForm.adminRole.trim()||null,
    }:t);
    setTeachers(updated);
    LS.set("sa_teachers",updated);
    setEditId(null);setEditForm({});
  };

  const toggleCls=(cls,isNew)=>{
    if(isNew){
      setNewForm(p=>({...p,classes:p.classes.includes(cls)?p.classes.filter(c=>c!==cls):[...p.classes,cls]}));
    }else{
      setEditForm(p=>({...p,classes:p.classes.includes(cls)?p.classes.filter(c=>c!==cls):[...p.classes,cls]}));
    }
  };

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:600}}>Teachers</div>
          <div style={{fontSize:12,color:C.g500,marginTop:2}}>{teachers.length} teachers</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {/* FIX #6: both admin and superadmin see credentials tab */}
          {isAdmin&&(
            <button onClick={()=>setTab(tab==="credentials"?"list":"credentials")}
              style={s.btn(tab==="credentials"?"primary":"secondary")}>
              🔑 {tab==="credentials"?"← Back":"View Credentials"}
            </button>
          )}
          {isAdmin&&tab==="list"&&(
            <button onClick={()=>setShowAdd(!showAdd)} style={s.btn("primary")}>
              <Ic n="plus" sz={13} c={C.white}/> Add Teacher
            </button>
          )}
        </div>
      </div>

      {/* CREDENTIALS TAB */}
      {tab==="credentials"&&(
        <div style={s.card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Teacher Credentials</div>
          <div style={{...s.bdg(isSA?C.purple:C.yellow,isSA?C.purpleL:C.yellowL),marginBottom:14,padding:"7px 12px",fontSize:12}}>
            {isSA?"Super Admin: Can view and edit all credentials":"School Admin: View only — contact Super Admin to edit"}
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
              <thead><tr>
                <th style={s.TH}>Name</th>
                <th style={s.TH}>Teacher ID</th>
                <th style={s.TH}>Password</th>
                {isSA&&<th style={s.TH}>Action</th>}
              </tr></thead>
              <tbody>{teachers.map(t=>(
                <tr key={t.id}>
                  <td style={s.TD}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={s.ava(26)}>{t.name.charAt(0)}</div>{t.name}</div></td>
                  <td style={s.TD}>
                    {isSA&&editId===t.id
                      ?<input style={{...fi,width:90}} value={editForm.id} onChange={e=>setEditForm(p=>({...p,id:e.target.value}))}/>
                      :<code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>{t.id}</code>}
                  </td>
                  <td style={s.TD}>
                    {isSA&&editId===t.id?(
                      <input style={{...fi,width:130}} value={editForm.pw} onChange={e=>setEditForm(p=>({...p,pw:e.target.value}))}/>
                    ):(
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>
                          {showPwMap[t.id]?t.pw:"••••••••"}
                        </code>
                        <button onClick={()=>setShowPwMap(p=>({...p,[t.id]:!p[t.id]}))}
                          style={{background:"none",border:`1px solid ${C.g200}`,borderRadius:4,padding:"2px 7px",fontSize:10,cursor:"pointer",color:C.g500}}>
                          {showPwMap[t.id]?"Hide":"Show"}
                        </button>
                      </div>
                    )}
                  </td>
                  {isSA&&(
                    <td style={s.TD}>
                      {editId===t.id?(
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={saveEdit} style={s.btn("success","sm")}><Ic n="chk" sz={11} c={C.green}/> Save</button>
                          <button onClick={()=>setEditId(null)} style={s.btn("secondary","sm")}>Cancel</button>
                        </div>
                      ):(
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>startEdit(t)} style={s.btn("secondary","sm")}>Edit</button>
                          <button onClick={()=>removeTeacher(t.id)} style={s.btn("danger","sm")}><Ic n="x" sz={11} c={C.red}/></button>
                        </div>
                      )}
                    </td>
                  )}
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* ADD FORM — FIX #1 */}
      {tab==="list"&&showAdd&&(
        <div style={{...s.card,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Add New Teacher</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Teacher ID *</div>
              <input style={s.inp} placeholder="e.g. T011" value={newForm.id}
                onChange={e=>setNewForm(p=>({...p,id:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Full Name *</div>
              <input style={s.inp} placeholder="Mrs. ..." value={newForm.name}
                onChange={e=>setNewForm(p=>({...p,name:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:4}}>Subject *</div>
              <select style={s.inp} value={newForm.subject} onChange={e=>setNewForm(p=>({...p,subject:e.target.value}))}>
                <option value="">Select subject</option>

            <div>

                  padding:"3px 10px",borderRadius:5,

    </div>
  );
}

// ═══════════════════════════════════
// REQUESTS
// ═══════════════════════════════════
function PageRequests({requests,setRequests,arrangements,setArrangements,teachers,attendance,user,periodsPerDay}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({arrId:"",reason:""});
  const[volModal,setVolModal]=useState(null);
  const myMonth=requests.filter(r=>r.teacherId===user.id&&r.date?.slice(0,7)===TODAY.slice(0,7)).length;
  const myArr=arrangements.filter(a=>a.subId===user.id);
  const isAdmin=user.role==="admin"||user.role==="superadmin";

  const submit=()=>{
    if(!form.arrId||!form.reason)return;
    const a=arrangements.find(x=>x.id===form.arrId);
    if(!a)return;
    setRequests(p=>[...p,{
      id:`R${Date.now()}`,teacherId:user.id,teacherName:user.name,
      arrId:form.arrId,arrInfo:`${a.class}-${a.section}, P${a.period}`,
      reason:form.reason,status:"pending",date:new Date().toISOString(),
    }]);
    setForm({arrId:"",reason:""});setShowForm(false);
  };

  const handleAction=(reqId,action)=>{
    const req=requests.find(r=>r.id===reqId);
    if(!req)return;
    if(action==="rejected"){
      setRequests(p=>p.map(r=>r.id===reqId?{...r,status:"rejected"}:r));return;
    }
    const arr=arrangements.find(a=>a.id===req.arrId);
    if(!arr){alert("Arrangement not found.");return;}
    const absentIds=Object.keys(attendance).filter(k=>!k.includes("_")&&["absent","emergency"].includes(attendance[k]));
    const PPD=periodsPerDay||8;
    const elig=teachers.filter(pt=>{
      if(pt.id===arr.subId)return false;
      if(absentIds.includes(pt.id))return false;
      if(arrangements.some(a=>a.subId===pt.id&&a.period===arr.period&&a.id!==arr.id))return false;
      const assigned=arrangements.filter(a=>a.subId===pt.id).length;
      if(assigned>=(PPD-pt.ppd))return false;
      const ptGroup=getGroup(pt);
      if(arr.abGroup==="Gr11–12"||ptGroup==="Gr11–12")return ptGroup===arr.abGroup;
      return true;
    });
    if(!elig.length){
      alert("No eligible substitute. Rejecting.");
      setRequests(p=>p.map(r=>r.id===reqId?{...r,status:"rejected",note:"No sub available"}:r));return;
    }
    const newSub=elig[0];
    setArrangements(p=>p.map(a=>a.id===arr.id?{...a,subId:newSub.id,subName:newSub.name,status:"reassigned"}:a));
    setRequests(p=>p.map(r=>r.id===reqId?{...r,status:"approved",newSub:newSub.name}:r));
  };

  const openVol=(req)=>{
    const arr=arrangements.find(a=>a.id===req.arrId);
    if(!arr)return;
    const elig=teachers.filter(t=>{
      if(t.id===req.teacherId||t.id===arr.subId)return false;
      if(["absent","emergency"].includes(attendance[t.id]))return false;
      const tg=getGroup(t);
      if(arr.abGroup==="Gr11–12"||tg==="Gr11–12")return tg===arr.abGroup;
      return true;
    });
    setVolModal({req,arr,elig});
  };

  const assignVol=(req,arr,t)=>{
    setArrangements(p=>p.map(a=>a.id===arr.id?{...a,subId:t.id,subName:t.name,status:"reassigned"}:a));
    setRequests(p=>p.map(r=>r.id===req.id?{...r,status:"approved",newSub:t.name,volunteer:true}:r));
    setVolModal(null);
  };

  const list=isAdmin?requests:requests.filter(r=>r.teacherId===user.id);

  // FIX #3: Group requests by date header (Today / Yesterday / older)
  const YESTERDAY=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const getDateLabel=(dateStr)=>{
    if(!dateStr)return"Older";
    const d=dateStr.slice(0,10);
    if(d===TODAY)return"Today";
    if(d===YESTERDAY)return"Yesterday";
    return d;
  };
  // Build grouped list for admin view
  const groupedRequests=()=>{
    const groups={};
    list.forEach(r=>{
      const lbl=getDateLabel(r.date);
      if(!groups[lbl])groups[lbl]=[];
      groups[lbl].push(r);
    });
    // Order: Today first, Yesterday second, rest by date desc
    const order=["Today","Yesterday"];
    const keys=[...order.filter(k=>groups[k]),...Object.keys(groups).filter(k=>!order.includes(k)).sort().reverse()];
    return keys.map(k=>({label:k,items:groups[k]}));
  };

  return(
    <div>
      <Modal open={!!volModal} onClose={()=>setVolModal(null)} title="Ask for Volunteer">
        {volModal&&(
          <div>
            <div style={{fontSize:13,color:C.g600,marginBottom:16,padding:"10px 14px",background:C.g50,borderRadius:8}}>
              <strong>Arrangement:</strong> {volModal.arr.class}-{volModal.arr.section}, Period {volModal.arr.period}<br/>
              <strong>Group:</strong> {volModal.arr.abGroup}
            </div>
            {!volModal.elig.length
              ?<div style={{textAlign:"center",padding:24,color:C.g400}}>No teachers available in this group.</div>
              :volModal.elig.map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.g100}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={s.ava(30)}>{t.name.charAt(0)}</div>
                    <div><div style={{fontSize:13,fontWeight:500}}>{t.name}</div><div style={{fontSize:11,color:C.g500}}>{t.subject}</div></div>
                  </div>
                  <button onClick={()=>assignVol(volModal.req,volModal.arr,t)} style={s.btn("success","sm")}>Assign</button>
                </div>
              ))
            }
          </div>
        )}
      </Modal>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:600}}>{isAdmin?"Change Requests":"My Change Requests"}</div>
          <div style={{fontSize:12,color:C.g500,marginTop:2}}>
            {user.role==="teacher"?`${myMonth}/${REQ_LIMIT} requests used this month`:`${requests.filter(r=>r.status==="pending").length} pending`}
          </div>
        </div>
        {user.role==="teacher"&&myMonth<REQ_LIMIT&&myArr.length>0&&(
          <button onClick={()=>setShowForm(!showForm)} style={s.btn("primary")}>
            <Ic n="plus" sz={13} c={C.white}/> New Request
          </button>
        )}
      </div>

      {user.role==="teacher"&&myMonth>=REQ_LIMIT&&(
        <div style={{background:C.yellowL,color:C.yellow,padding:"9px 14px",borderRadius:8,fontSize:12,marginBottom:14,display:"flex",gap:6,alignItems:"center"}}>
          <Ic n="alert" sz={12} c={C.yellow}/> Monthly limit (2/month) reached. Resets next month.
        </div>
      )}

      {showForm&&(
        <div style={{...s.card,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Submit Change Request</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Select Arrangement</div>
              <select style={s.inp} value={form.arrId} onChange={e=>setForm(p=>({...p,arrId:e.target.value}))}>
                <option value="">-- Select --</option>
                {myArr.map(a=><option key={a.id} value={a.id}>{a.class}-{a.section}, Period {a.period}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Reason</div>
              <textarea style={{...s.inp,height:70,resize:"vertical"}} placeholder="Explain your reason..."
                value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={submit} style={s.btn("primary")}>Submit</button>
              <button onClick={()=>setShowForm(false)} style={s.btn("secondary")}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      <div>
        {!list.length?(
          <div style={{...s.card,textAlign:"center",padding:40,color:C.g400,fontSize:12}}>No requests yet</div>
        ):isAdmin?(
          /* FIX #3: Admin sees Today / Yesterday / date grouped headers */
          groupedRequests().map(group=>(
            <div key={group.label} style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:600,color:C.g500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,paddingLeft:2}}>
                {group.label} · {group.items.length} request{group.items.length!==1?"s":""}
              </div>
              <div style={{...s.card,padding:0,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:580}}>
                    <thead><tr>
                      <th style={s.TH}>Teacher</th>
                      <th style={s.TH}>Arrangement</th>
                      <th style={s.TH}>Reason</th>
                      <th style={s.TH}>Status</th>
                      <th style={s.TH}>Actions</th>
                    </tr></thead>
                    <tbody>{group.items.map(r=>(
                      <tr key={r.id}>
                        <td style={s.TD}>{r.teacherName}</td>
                        <td style={s.TD}>{r.arrInfo}</td>
                        <td style={s.TD}>{r.reason}</td>
                        <td style={s.TD}>
                          <span style={s.bdg(
                            r.status==="pending"?C.yellow:r.status==="approved"?C.green:C.red,
                            r.status==="pending"?C.yellowL:r.status==="approved"?C.greenL:C.redL
                          )}>
                            {r.status}{r.newSub?` → ${r.newSub}`:""}
                          </span>
                        </td>
                        <td style={s.TD}>
                          {r.status==="pending"?(
                            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                              <button onClick={()=>handleAction(r.id,"approved")} style={s.btn("success","sm")}><Ic n="chk" sz={11} c={C.green}/> Approve</button>
                              <button onClick={()=>handleAction(r.id,"rejected")} style={s.btn("danger","sm")}><Ic n="x" sz={11} c={C.red}/> Reject</button>
                              <button onClick={()=>openVol(r)} style={s.btn("warning","sm")}>Volunteer</button>
                            </div>
                          ):<span style={{color:C.g400,fontSize:12}}>—</span>}
                        </td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            </div>
          ))
        ):(
          /* Teacher sees flat list */
          <div style={s.card}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:480}}>
                <thead><tr>
                  <th style={s.TH}>Arrangement</th>
                  <th style={s.TH}>Reason</th>
                  <th style={s.TH}>Status</th>
                </tr></thead>
                <tbody>{list.map(r=>(
                  <tr key={r.id}>
                    <td style={s.TD}>{r.arrInfo}</td>
                    <td style={s.TD}>{r.reason}</td>
                    <td style={s.TD}>
                      <span style={s.bdg(
                        r.status==="pending"?C.yellow:r.status==="approved"?C.green:C.red,
                        r.status==="pending"?C.yellowL:r.status==="approved"?C.greenL:C.redL
                      )}>
                        {r.status}{r.newSub?` → ${r.newSub}`:""}
                      </span>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// REPORTS
// ═══════════════════════════════════
function PageReports({teachers,arrangements,requests,user}){
  const[sel,setSel]=useState(user.role==="teacher"?user.id:"all");
  const month=new Date().toLocaleString("default",{month:"long",year:"numeric"});
  const isAdmin=user.role==="admin"||user.role==="superadmin";
  const getRep=(t)=>{
    const seed=t.id.charCodeAt(1);
    const pres=18+(seed%6);const abs=26-pres;
    const arr=arrangements.filter(a=>a.subId===t.id).length+(seed%3);
    const req=requests.filter(r=>r.teacherId===t.id).length;
    return{present:pres,absent:abs,pct:Math.round((pres/26)*100),arr,req};
  };
  const list=user.role==="teacher"?teachers.filter(t=>t.id===user.id):(sel==="all"?teachers:teachers.filter(t=>t.id===sel));
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div><div style={{fontSize:16,fontWeight:600}}>Monthly Reports</div><div style={{fontSize:12,color:C.g500,marginTop:2}}>{month}</div></div>
        {isAdmin&&(
          <select style={{...s.inp,width:200}} value={sel} onChange={e=>setSel(e.target.value)}>
            <option value="all">All Teachers</option>
            {teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        )}
      </div>
      {list.map(t=>{
        const r=getRep(t);
        return(
          <div key={t.id} style={{...s.card,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={s.ava(38)}>{t.name.charAt(0)}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                  <div style={{fontSize:11,color:C.g500}}>{t.subject} · {t.id}</div>
                  {t.classTeacher&&<div style={{fontSize:10,color:C.blue,marginTop:2}}>Class Teacher: {t.classTeacher}</div>}
                </div>
              </div>
              <span style={s.bdg(r.pct>=90?C.green:r.pct>=75?C.yellow:C.red,r.pct>=90?C.greenL:r.pct>=75?C.yellowL:C.redL)}>{r.pct}% Attendance</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:14}}>
              {[{l:"Days Present",v:r.present,c:C.green},{l:"Days Absent",v:r.absent,c:C.red},{l:"Arrangements Done",v:r.arr,c:C.blue},{l:"Change Requests",v:r.req,c:C.yellow}].map(x=>(
                <div key={x.l} style={{textAlign:"center",padding:"10px",background:C.g50,borderRadius:8}}>
                  <div style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:C.g500,marginTop:3}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div style={{height:5,background:C.g100,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:3,width:`${r.pct}%`,background:r.pct>=90?C.green:r.pct>=75?C.yellow:C.red}}/>
            </div>
            {t.adminRole&&<div style={{marginTop:10,padding:"7px 12px",background:C.blueL,borderRadius:6,fontSize:11,color:C.blue}}>Also serving as: <strong>{t.adminRole}</strong></div>}
          </div>
        );
      })}
    </div>
  );
}

// MANAGE ADMINS — Super Admin only
// ═══════════════════════════════════
function PageAdmins({users,setUsers}){
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({id:"",name:"",pw:""});
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[showPw,setShowPw]=useState({});
  const admins=users.filter(u=>u.role==="admin");
  const fi={...s.inp,padding:"5px 8px",fontSize:12};

  const add=()=>{
    if(!form.id||!form.name||!form.pw){alert("Fill all fields.");return;}
    if(users.find(u=>u.id===form.id)){alert("ID already exists.");return;}
    const updated=[...users,{...form,role:"admin"}];
    setUsers(updated);LS.set("sa_users",updated);
    setForm({id:"",name:"",pw:""});setShowAdd(false);
  };
  const remove=(id)=>{
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);LS.set("sa_users",updated);
    if(editId===id)setEditId(null);
  };
  const startEdit=(a)=>{setEditId(a.id);setEditForm({...a});};
  const saveEdit=()=>{
    if(!editForm.name||!editForm.pw){alert("Name and password required.");return;}
    const updated=users.map(u=>u.id===editId?{...u,name:editForm.name,pw:editForm.pw}:u);
    setUsers(updated);LS.set("sa_users",updated);
    setEditId(null);setEditForm({});

    <div>

        <div>
          <div style={{fontSize:16,fontWeight:600}}>Manage School Admins</div>

            <div><div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Full Name</div><input style={s.inp} placeholder="Vice Principal" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
            <div><div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Password</div><input style={s.inp} value={form.pw} onChange={e=>setForm(p=>({...p,pw:e.target.value}))}/></div>

            <button onClick={()=>setShowAdd(false)} style={s.btn("secondary")}>Cancel</button>

          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
              <thead><tr><th style={s.TH}>Name</th><th style={s.TH}>Admin ID</th><th style={s.TH}>Password</th><th style={s.TH}>Actions</th></tr></thead>
              <tbody>{admins.map(a=>(
                <tr key={a.id}>
                  {editId===a.id?(
                    <>
                      <td style={s.TD}><input style={{...fi,width:160}} value={editForm.name} onChange={e=>setEditForm(p=>({...p,name:e.target.value}))}/></td>
                      <td style={s.TD}><code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>{a.id}</code></td>
                      <td style={s.TD}><input style={{...fi,width:150}} value={editForm.pw} onChange={e=>setEditForm(p=>({...p,pw:e.target.value}))}/></td>
                      <td style={s.TD}><div style={{display:"flex",gap:5}}><button onClick={saveEdit} style={s.btn("success","sm")}><Ic n="chk" sz={11} c={C.green}/> Save</button><button onClick={()=>setEditId(null)} style={s.btn("secondary","sm")}>Cancel</button></div></td>
                    </>
                  ):(
                    <>
                      <td style={s.TD}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={s.ava(30,"#333")}>{a.name.charAt(0)}</div><span style={{fontWeight:500}}>{a.name}</span></div></td>
                      <td style={s.TD}><code style={{fontSize:11,background:C.g100,padding:"2px 6px",borderRadius:4}}>{a.id}</code></td>

function SuperAdminCredEditor({users,setUsers}){
  const sa=users.find(u=>u.role==="superadmin");
  const[form,setForm]=useState({id:sa?.id||"",name:sa?.name||"",pw:sa?.pw||""});
  const[saved,setSaved]=useState(false);
  const[showPw,setShowPw]=useState(false);

  const save=()=>{
    if(!form.id.trim()||!form.name.trim()||!form.pw.trim()){alert("All fields required.");return;}
    const updated=users.map(u=>u.role==="superadmin"?{...u,id:form.id.trim(),name:form.name.trim(),pw:form.pw.trim()}:u);
    setUsers(updated);
    LS.set("sa_users",updated);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);

  return(
    <div style={{...s.card,marginTop:16,borderLeft:`3px solid ${C.purple}`}}>

        </div>
        <div>
          <div style={{fontSize:11,fontWeight:500,color:C.g600,marginBottom:5}}>Display Name</div>
          <input style={s.inp} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
        </div>
        <div>

          <div style={{display:"flex",gap:6}}>

      <div style={{fontSize:11,color:C.g500,marginTop:10}}>

      </div>
    </div>
  );
}

function FullTimetableView({classId,cls,schedule,timetable,setTimetable,teachers}){
  const[editCell,setEditCell]=useState(null); // {day,periodId}
  const[cellForm,setCellForm]=useState({subject:"",teacherId:""});
  const isNursery=cls?.tier==="nursery";
  const subList=isNursery?NURSERY_SUBJECTS:MAIN_SUBJECTS;
  const periodSlots=schedule.filter(sl=>sl.type==="period");
  const ft=timetable.fullTimetable||{};
  const clsFT=ft[classId]||{};

  const getCell=(day,periodId)=>(clsFT[day]||{})[periodId]||{subject:"",teacherId:""};

  const startEditCell=(day,periodId)=>{
    setEditCell({day,periodId});
    setCellForm({...getCell(day,periodId)});
  };

  const saveCell=()=>{
    if(!editCell)return;
    const updated={...timetable};
    if(!updated.fullTimetable)updated.fullTimetable={};
    if(!updated.fullTimetable[classId])updated.fullTimetable[classId]={};
    if(!updated.fullTimetable[classId][editCell.day])updated.fullTimetable[classId][editCell.day]={};
    updated.fullTimetable[classId][editCell.day][editCell.periodId]={...cellForm};
    setTimetable(updated);LS.set("sa_timetable",updated);
    setEditCell(null);
  };

  const clearCell=(day,periodId)=>{
    const updated={...timetable};
    if(updated.fullTimetable?.[classId]?.[day]?.[periodId]){
      delete updated.fullTimetable[classId][day][periodId];
      setTimetable(updated);LS.set("sa_timetable",updated);
    }
  };

  const getTeacherShort=(tid)=>{
    const t=teachers.find(x=>x.id===tid);
    if(!t)return"";
    const parts=t.name.split(" ");
    return`(${parts[0]}${parts[1]?"."+parts[1].charAt(0):"."})`;
  };

  return(
    <div>
      <div style={{marginBottom:12,fontSize:12,color:C.g500}}>
        Click any cell to edit. Shows full Mon–Sat timetable for <strong>{cls?.label}</strong>.
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:720,fontSize:12}}>
          <thead>
            <tr>
              <th style={{...s.TH,width:110}}>Period / Time</th>
              {DAYS.map(d=><th key={d} style={{...s.TH,textAlign:"center",minWidth:100}}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {periodSlots.map(sl=>(
              <tr key={sl.id}>
                <td style={{...s.TD,background:C.g50,fontWeight:500}}>
                  <div style={{fontSize:12,fontWeight:600}}>{sl.label}</div>
                  <div style={{fontSize:10,color:C.g400,fontFamily:"monospace"}}>{sl.start}–{sl.end}</div>
                  {sl.mins&&<div style={{fontSize:10,color:C.g400}}>{sl.mins} min</div>}
                </td>
                {DAYS.map(day=>{
                  const cell=getCell(day,sl.id);
                  const isEditing=editCell?.day===day&&editCell?.periodId===sl.id;
                  if(isEditing){
                    return(
                      <td key={day} style={{...s.TD,background:C.blueL,padding:8,verticalAlign:"top"}}>
                        <select style={{...s.inp,padding:"3px 6px",fontSize:11,marginBottom:5}}
                          value={cellForm.subject}
                          onChange={e=>setCellForm(p=>({...p,subject:e.target.value}))}>
                          <option value="">-- Subject --</option>
                          {subList.map(x=><option key={x}>{x}</option>)}
                        </select>
                        <select style={{...s.inp,padding:"3px 6px",fontSize:11,marginBottom:5}}
                          value={cellForm.teacherId}
                          onChange={e=>setCellForm(p=>({...p,teacherId:e.target.value}))}>
                          <option value="">-- Teacher --</option>
                          {teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                        </select>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={saveCell} style={s.btn("success","sm")}><Ic n="chk" sz={10} c={C.green}/></button>
                          <button onClick={()=>setEditCell(null)} style={s.btn("secondary","sm")}><Ic n="x" sz={10} c={C.g500}/></button>
                        </div>
                      </td>
                    );
                  }
                  return(
                    <td key={day}
                      onClick={()=>startEditCell(day,sl.id)}
                      style={{...s.TD,cursor:"pointer",verticalAlign:"top",padding:"8px",
                        background:cell.subject?"#FAFFFE":C.white,
                        border:`1px solid ${C.g200}`}}
                      title="Click to edit">
                      {cell.subject?(
                        <div>
                          <div style={{fontWeight:600,fontSize:12,color:C.g900}}>{cell.subject}</div>
                          <div style={{fontSize:10,color:C.g500,marginTop:2}}>
                            {cell.teacherId?getTeacherShort(cell.teacherId):""}
                          </div>
                          <button
                            onClick={e=>{e.stopPropagation();clearCell(day,sl.id);}}
                            style={{background:"none",border:"none",cursor:"pointer",color:C.g300,fontSize:10,padding:0,marginTop:2}}>
                            ✕ clear
                          </button>
                        </div>
                      ):(
                        <div style={{color:C.g300,fontSize:11,textAlign:"center",paddingTop:4}}>+</div>
                      )}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
